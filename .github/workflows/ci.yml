name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - name: 📦 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 📥 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: 🔍 Run flake8 linting
      run: flake8 . --config=.flake8

    - name: 🗄️ Check migrations
      env:
        DJANGO_SETTINGS_MODULE: config.settings
        DB_HOST: localhost
        DB_NAME: test_db
        DB_USER: test_user
        DB_PASSWORD: test_pass
        DEBUG: 'True'
        SECRET_KEY: test-key-for-ci-only
        ALLOWED_HOSTS: '*'
      run: python manage.py makemigrations --check --dry-run

    - name: 🧪 Run tests
      env:
        DJANGO_SETTINGS_MODULE: config.settings
        DB_HOST: localhost
        DB_NAME: test_db
        DB_USER: test_user
        DB_PASSWORD: test_pass
        DEBUG: 'True'
        SECRET_KEY: test-key-for-ci-only
        ALLOWED_HOSTS: '*'
      run: python manage.py test cars

  build-docker:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: 📦 Checkout code
      uses: actions/checkout@v4

    - name: 🐳 Build Docker image
      run: docker build -t jaa_miet_project:latest .

    - name: ✅ Verify image starts
      run: |
        docker run -d --name test-app -p 8000:8000 \
          -e DB_HOST=localhost \
          -e DB_NAME=test \
          -e DB_USER=test \
          -e DB_PASSWORD=test \
          -e DEBUG=True \
          -e SECRET_KEY=test \
          -e ALLOWED_HOSTS='*' \
          jaa_miet_project:latest
        sleep 15
        curl -f http://localhost:8000/admin/ || exit 1
        docker stop test-app && docker rm test-app