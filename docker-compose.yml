services:
  db:
    image: postgres:15-alpine
    container_name: jaa_postgres
    environment:
      POSTGRES_DB: jaa_db
      POSTGRES_USER: jaa_user
      POSTGRES_PASSWORD: jaa_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jaa_user -d jaa_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jaa_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: