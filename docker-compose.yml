services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - jaa_net  # ← Все сервисы в одной сети

  db:  # ← Имя сервиса должно быть "db"
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jaa_net

  redis:
    image: redis:7-alpine
    networks:
      - jaa_net

volumes:
  postgres_data:

networks:
  jaa_net:  # ← Общая сеть
    driver: bridge