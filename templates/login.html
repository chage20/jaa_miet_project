{% extends 'base.html' %}
{% load static %}

{% block title %}Вход{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/auth.css' %}">{% endblock %}

{% block content %}
<div class="auth-section">
    <div class="auth-card">
        <h2>Вход</h2>
        {% if messages %}{% for message in messages %}<div class="alert alert-{{ message.tags }}">{{ message }}</div>{% endfor %}{% endif %}
        <form method="POST" class="registration-form">
            {% csrf_token %}
            <div class="form-group"><label for="id_username">Логин или Email</label><input type="text" name="username" id="id_username" class="form-control" required></div>
            <div class="form-group"><label for="id_password">Пароль</label><input type="password" name="password" id="id_password" class="form-control" required></div>
            <button type="submit" class="btn-primary">Войти</button>
        </form>
        <p class="auth-link">Нет аккаунта? <a href="{% url 'users:register' %}">Зарегистрироваться</a></p>
    </div>
</div>
{% endblock %}
